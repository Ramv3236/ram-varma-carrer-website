<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="mlloSTnxs4k_8XhIJQ-HDwDSldgFJRinMD35xSAL4dU" />
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rama Sai Mohith Varma — Creative Video Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root {
    --apple-bg: #000000;
    --apple-card: #161617;
    --apple-card-light: #1D1D1F;
    --apple-text: #F5F5F7;
    --apple-muted: #86868B;
    --apple-accent: #2997FF;
    --apple-border: rgba(255, 255, 255, 0.06);
    --apple-hover-border: rgba(255, 255, 255, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; background-color: var(--apple-bg); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    background: var(--apple-bg);
    color: var(--apple-text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient Glass Gradient Background Overlays */
  .ambient-blur {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .blur-orb {
    position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.12;
  }
  .orb-1 { width: 600px; height: 600px; top: -150px; left: -100px; background: radial-gradient(circle, #2997FF, transparent 70%); }
  .orb-2 { width: 500px; height: 500px; bottom: 20%; right: -100px; background: radial-gradient(circle, #8B5CF6, transparent 70%); }

  /* 3D Model Workstation Background Canvas Container */
  #webgl-bg-container {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.22;
    filter: saturate(0.85) brightness(0.65);
  }

  .pp-timeline-bg {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
  }

  /* Dark vignette — strong center clear, edges very dark */
  .pp-timeline-bg::before {
    content: ''; position: absolute; inset: 0; z-index: 10;
    background:
      radial-gradient(ellipse 70% 50% at 50% 28%, transparent 0%, rgba(0,0,0,0.5) 100%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.25) 30%,
        rgba(0,0,0,0.35) 60%,
        rgba(0,0,0,0.96) 100%
      );
  }

  /* ── FLOATING EFFECTS PRESETS PANEL (top-right) ── */
  .pp-effects-panel {
    position: absolute; top: 64px; right: 18px; width: 170px; z-index: 6;
    background: rgba(14,14,18,0.82);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: panelFadeIn 2s ease forwards;
  }
  @keyframes panelFadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .pp-effects-header {
    background: rgba(255,255,255,0.04); padding: 6px 10px;
    font-family: 'SF Mono',monospace; font-size: 8px; font-weight:700;
    color: rgba(255,255,255,0.5); letter-spacing:1px; text-transform:uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items:center; gap:6px;
  }
  .pp-effects-header::before { content:'⬡'; color:#9B59B6; font-size:10px; }
  .pp-effect-category {
    padding: 5px 10px 3px;
    font-family: 'SF Mono',monospace; font-size: 7px; font-weight:700;
    color: rgba(255,165,0,0.7); letter-spacing:0.8px; text-transform:uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .pp-effect-item {
    padding: 4px 10px 4px 18px; font-family:'SF Mono',monospace;
    font-size: 7.5px; color: rgba(255,255,255,0.45);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display:flex; align-items:center; gap:6px;
    transition: background 0.2s;
  }
  .pp-effect-item::before { content:'○'; font-size:7px; color:rgba(255,255,255,0.2); }
  .pp-effect-item.active { background:rgba(41,151,255,0.08); color:rgba(160,210,255,0.9); }
  .pp-effect-item.active::before { content:'●'; color:#2997FF; }

  /* ── FLOATING SOURCE MONITOR (top-left) ── */
  .pp-source-monitor {
    position: absolute; top: 64px; left: 18px; width: 200px; z-index: 6;
    background: rgba(14,14,18,0.85);
    border: 1px solid rgba(255,255,255,0.07); border-radius:8px; overflow:hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: panelFadeIn 2.2s ease forwards;
  }
  .pp-monitor-screen {
    width:100%; aspect-ratio:16/9; background:#000;
    position:relative; overflow:hidden;
  }
  .pp-monitor-screen canvas { width:100%; height:100%; display:block; }
  .pp-monitor-bar {
    background: rgba(10,10,14,0.95); padding:5px 8px;
    display:flex; align-items:center; gap:6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .pp-monitor-label {
    font-family:'SF Mono',monospace; font-size:7px;
    color:rgba(255,255,255,0.4); flex:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .pp-monitor-tc {
    font-family:'SF Mono',monospace; font-size:8px; font-weight:700;
    color:#2997FF; letter-spacing:1px;
  }

  /* ── LUMETRI SCOPES PANEL ── */
  .pp-scopes {
    position: absolute; top: 64px; left: 236px; width: 130px; z-index: 6;
    background: rgba(14,14,18,0.82); border: 1px solid rgba(255,255,255,0.07);
    border-radius:8px; overflow:hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: panelFadeIn 2.4s ease forwards;
  }
  .pp-scopes-header {
    background: rgba(255,255,255,0.04); padding:5px 8px;
    font-family:'SF Mono',monospace; font-size:7px; font-weight:700;
    color:rgba(255,255,255,0.4); letter-spacing:1px; text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .pp-scope-canvas { display:block; width:100%; }

  /* ── MAIN TIMELINE PANEL ── */
  .pp-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 310px;
    background: linear-gradient(180deg,
      rgba(20,20,24,0) 0%,
      rgba(18,18,22,0.93) 8%,
      rgba(15,15,19,0.98) 100%
    );
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column;
  }

  /* Toolbar row */
  .pp-toolbar {
    height: 32px; background: rgba(12,12,16,0.96);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink:0;
  }
  .pp-toolbar-btn {
    width:22px; height:22px; border-radius:4px;
    background: rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:center;
    font-size:9px; color:rgba(255,255,255,0.4);
  }
  .pp-toolbar-btn.active { background:rgba(41,151,255,0.2); color:#2997FF; }
  .pp-toolbar-sep { width:1px; height:16px; background:rgba(255,255,255,0.07); margin:0 2px; }
  .pp-timecode {
    margin-left:auto;
    font-family:'SF Mono',monospace; font-size:12px; font-weight:700;
    color:#FF6B35; letter-spacing:2px;
    text-shadow:0 0 12px rgba(255,107,53,0.5);
  }
  .pp-fps-label {
    font-family:'SF Mono',monospace; font-size:9px;
    color:rgba(255,255,255,0.25); margin-left:8px;
  }

  /* Timecode ruler */
  .pp-ruler {
    height: 20px; background: rgba(10,10,14,0.98);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items:stretch; flex-shrink:0;
    overflow:hidden; position:relative;
  }
  .pp-ruler-track-spacer { width:82px; flex-shrink:0; border-right:1px solid rgba(255,255,255,0.08); }
  .pp-ruler-ticks { flex:1; position:relative; overflow:hidden; }
  .pp-ruler-ticks canvas { display:block; width:100%; height:100%; }

  /* Playhead */
  .pp-playhead {
    position: absolute; top: 20px; width: 2px; height: calc(100% - 20px);
    background: linear-gradient(180deg,#FF6B35 0%,rgba(255,107,53,0.15) 100%);
    z-index: 8; pointer-events: none;
    animation: playheadMove 12s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  .pp-playhead::before {
    content:'▼'; position:absolute; top:-14px; left:-5px;
    font-size:9px; color:#FF6B35;
    text-shadow:0 0 6px rgba(255,107,53,0.8);
  }
  .pp-playhead::after {
    content:''; position:absolute; top:0; left:-6px; width:14px; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,107,53,0.04), transparent);
  }
  @keyframes playheadMove {
    0%   { left: 82px; }
    45%  { left: calc(95% + 82px); }
    50%  { left: calc(95% + 82px); }
    100% { left: 82px; }
  }

  /* Track area */
  .pp-track-area {
    flex:1; display:flex; overflow:hidden;
  }
  .pp-track-headers {
    width:82px; flex-shrink:0;
    background:rgba(12,12,16,0.97);
    border-right:1px solid rgba(255,255,255,0.07);
    display:flex; flex-direction:column; gap:2px; padding:4px 0;
    overflow:hidden;
  }
  .pp-track-header {
    height:26px; flex-shrink:0;
    display:flex; align-items:center; padding:0 6px; gap:4px;
  }
  .pp-track-header-eye {
    width:10px; height:10px; border-radius:50%;
    background:rgba(255,255,255,0.1); flex-shrink:0;
    font-size:7px; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.4);
  }
  .pp-track-header-eye.on { background:rgba(255,255,100,0.15); color:rgba(255,255,100,0.7); }
  .pp-track-header-name {
    font-family:'SF Mono',monospace; font-size:7px;
    color:rgba(255,255,255,0.35); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; flex:1;
  }
  .pp-track-header-lock {
    font-size:7px; color:rgba(255,255,255,0.15);
  }

  /* Track lanes */
  .pp-tracks { flex:1; display:flex; flex-direction:column; gap:2px; padding:4px 4px; overflow:hidden; }
  .pp-track {
    height:26px; flex-shrink:0; position:relative;
    border-radius:2px; background:rgba(255,255,255,0.015);
    overflow:hidden;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  /* Clip base */
  .pp-clip {
    position: absolute; top:1px; height:calc(100% - 2px);
    border-radius:3px;
    display:flex; align-items:center; padding:0 7px;
    font-family:'SF Mono',monospace; font-size:6.5px; font-weight:700;
    letter-spacing:0.4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-top:1px solid rgba(255,255,255,0.18);
    border-left:1px solid rgba(255,255,255,0.1);
  }

  /* Clip colour schemes */
  .c-purple { background:linear-gradient(135deg,rgba(75,35,150,0.9),rgba(105,60,195,0.75)); color:rgba(210,185,255,0.9); }
  .c-blue   { background:linear-gradient(135deg,rgba(30,75,165,0.9),rgba(50,110,215,0.75)); color:rgba(160,205,255,0.9); }
  .c-teal   { background:linear-gradient(135deg,rgba(15,85,75,0.9),rgba(25,125,105,0.75)); color:rgba(120,235,205,0.9); }
  .c-green  { background:linear-gradient(135deg,rgba(20,100,40,0.9),rgba(35,145,60,0.75)); color:rgba(140,240,160,0.9); }
  .c-amber  { background:linear-gradient(135deg,rgba(130,65,0,0.9),rgba(190,95,0,0.75)); color:rgba(255,200,100,0.9); }
  .c-red    { background:linear-gradient(135deg,rgba(140,25,25,0.75),rgba(195,40,40,0.55)); color:rgba(255,155,155,0.9); }
  .c-pink   { background:linear-gradient(135deg,rgba(130,25,100,0.75),rgba(185,40,140,0.55)); color:rgba(255,160,230,0.9); }
  .c-slate  { background:linear-gradient(135deg,rgba(40,50,70,0.85),rgba(60,75,105,0.7)); color:rgba(175,195,235,0.9); }

  /* Cross-dissolve / transition diamond */
  .pp-xdissolve {
    position:absolute; top:50%; transform:translateY(-50%);
    width:14px; height:14px; z-index:3;
    background:rgba(255,255,255,0.18);
    clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  }
  /* Dip-to-black bar */
  .pp-dip {
    position:absolute; top:0; width:10px; height:100%; z-index:3;
    background:linear-gradient(90deg, transparent, rgba(0,0,0,0.7), transparent);
  }
  /* Motion blur transition */
  .pp-mblur {
    position:absolute; top:0; width:16px; height:100%; z-index:3;
    background:linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    filter:blur(2px);
  }

  /* Audio waveform */
  .pp-wave-canvas { position:absolute; inset:0; width:100%; height:100%; }

  /* Keyframe diamond on clips */
  .pp-kf {
    position:absolute; top:50%; transform:translateY(-50%);
    width:6px; height:6px; z-index:4;
    background:#FFD700;
    clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  }

  /* ── TICKER: scrolling effects & presets ── */
  .pp-fx-ticker {
    position:absolute; bottom:310px; left:0; right:0; height:22px;
    background:rgba(10,10,14,0.85); border-top:1px solid rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.05);
    overflow:hidden; display:flex; align-items:center;
  }
  .pp-fx-ticker-inner {
    display:flex; align-items:center; gap:0; white-space:nowrap;
    animation: fxScroll 30s linear infinite;
    font-family:'SF Mono',monospace; font-size:7.5px; color:rgba(255,255,255,0.3);
  }
  @keyframes fxScroll {
    0%   { transform:translateX(0); }
    100% { transform:translateX(-50%); }
  }
  .pp-fx-chip {
    display:inline-flex; align-items:center; gap:5px;
    padding:2px 12px; border-right:1px solid rgba(255,255,255,0.05);
  }
  .pp-fx-chip .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .dot-purple { background:#9B59B6; }
  .dot-blue   { background:#2997FF; }
  .dot-green  { background:#27AE60; }
  .dot-amber  { background:#F39C12; }
  .dot-red    { background:#E74C3C; }
  .dot-cyan   { background:#1ABC9C; }

  @keyframes trackScroll {
    0%   { transform:translateX(0); }
    40%  { transform:translateX(-18%); }
    60%  { transform:translateX(-18%); }
    100% { transform:translateX(0); }
  }
  .pp-track-scroll { animation: trackScroll 22s ease-in-out infinite; width:160%; }

  /* === APPLE GLASS UI ANIMATIONS FOR CARDS === */
  .video-card,
  .cert-card,
  .price-card {
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(22, 22, 26, 0.72) !important;
    box-shadow: 
      0 8px 32px rgba(0,0,0,0.4),
      0 1px 0 rgba(255,255,255,0.06) inset,
      0 0 0 1px rgba(255,255,255,0.06);
    transition: 
      transform 0.4s cubic-bezier(0.25,1,0.5,1),
      box-shadow 0.4s ease,
      border-color 0.4s ease !important;
  }

  .video-card:hover,
  .cert-card:hover,
  .price-card:hover {
    box-shadow: 
      0 20px 60px rgba(0,0,0,0.6),
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 40px rgba(41,151,255,0.08) !important;
    transform: translateY(-6px) scale(1.01) !important;
  }

  .video-card::after,
  .price-card::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.04) 40%,
      rgba(255,255,255,0.08) 50%,
      rgba(255,255,255,0.04) 60%,
      rgba(255,255,255,0) 100%
    );
    background-size: 200% 200%;
    background-position: -100% -100%;
    transition: background-position 0.6s ease;
    pointer-events: none; z-index: 0;
  }
  .video-card:hover::after,
  .price-card:hover::after {
    background-position: 200% 200%;
  }

  .hero-pill {
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    background: rgba(255,255,255,0.06) !important;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.08) inset;
    animation: pillFloat 4s ease-in-out infinite;
  }
  @keyframes pillFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-4px); }
  }

  .apple-btn {
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position: relative; overflow: hidden;
  }
  .apple-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.5s ease;
  }
  .apple-btn:hover::before { left: 140%; }

  .profile-image-wrapper {
    box-shadow: 
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 48px rgba(0,0,0,0.5),
      0 0 80px rgba(41,151,255,0.06);
  }

  .tools-dock {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .tool-item {
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04) !important;
    border: 1px solid var(--apple-border);
    padding: 20px 16px;
    border-radius: 14px;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .tool-item:hover {
    background: rgba(255,255,255,0.09) !important;
    border-color: rgba(41,151,255,0.4) !important;
    transform: translateY(-4px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.3), 0 0 20px rgba(41,151,255,0.1);
  }
  
  /* Badges for different Adobe Software ecosystems */
  .adobe-icon {
    font-size: 1.5rem;
    font-weight: 800;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .icon-pr { background: #14002B; color: #EA77FF; border: 1px solid #EA77FF; }
  .icon-ae { background: #12002E; color: #D191FF; border: 1px solid #D191FF; }
  .icon-ps { background: #001C3A; color: #31A8FF; border: 1px solid #31A8FF; }
  .icon-ai { background: #261300; color: #FF9A00; border: 1px solid #FF9A00; }
  .icon-au { background: #00241B; color: #00E4B2; border: 1px solid #00E4B2; }
  .icon-me { background: #062200; color: #43F300; border: 1px solid #43F300; }
  .icon-an { background: #2C0006; color: #FF264D; border: 1px solid #FF264D; }
  .icon-xd { background: #2E001F; color: #FF61D5; border: 1px solid #FF61D5; }
  .icon-lr { background: #001E31; color: #40BFFF; border: 1px solid #40BFFF; }
  .icon-id { background: #2C0011; color: #FF3385; border: 1px solid #FF3385; }

  .section-tag { text-shadow: 0 0 20px rgba(41,151,255,0.5); }

  .price-card.featured {
    background: rgba(30,35,55,0.8) !important;
    backdrop-filter: blur(24px) saturate(200%);
    box-shadow: 
      0 30px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(41,151,255,0.12),
      0 1px 0 rgba(100,160,255,0.15) inset !important;
  }

  /* Fixed Navigation */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 52px;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--apple-border);
  }
  .nav-logo { font-size: 0.95rem; font-weight: 600; letter-spacing: -0.2px; color: var(--apple-text); }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    text-decoration: none; color: var(--apple-muted); font-size: 0.82rem; font-weight: 400;
    transition: color 0.3s ease;
  }
  .nav-links a:hover { color: var(--apple-text); }

  /* Containers */
  .main-container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Hero */
  .hero {
    min-height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding-top: 60px;
