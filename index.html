<style>
  :root {
    --apple-bg: #000000;
    --apple-card: #161617;
    --apple-card-light: #1D1D1F;
    --apple-text: #F5F5F7;
    --apple-muted: #86868B;
    --apple-accent: #2997FF;
    --apple-border: rgba(255, 255, 255, 0.06);
    --apple-hover-border: rgba(255, 255, 255, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; background-color: var(--apple-bg); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    background: var(--apple-bg);
    color: var(--apple-text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 340px; /* Space for fixed timeline workspace */
  }

  /* Ambient Glass Gradient Background Overlays */
  .ambient-blur {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .blur-orb {
    position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.12;
  }
  .orb-1 { width: 600px; height: 600px; top: -150px; left: -100px; background: radial-gradient(circle, #2997FF, transparent 70%); }
  .orb-2 { width: 500px; height: 500px; bottom: 20%; right: -100px; background: radial-gradient(circle, #8B5CF6, transparent 70%); }

  /* ═══════════════════════════════════════════════════════════
       PREMIERE PRO FULL EDITING ENVIRONMENT BACKGROUND
  ═══════════════════════════════════════════════════════════ */

  #bg-edit-canvas {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.07; pointer-events: none;
    filter: saturate(0.3) brightness(0.6);
  }

  .pp-timeline-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
  }

  .pp-timeline-bg::before {
    content: ''; position: absolute; inset: 0; z-index: 10;
    background:
      radial-gradient(ellipse 70% 50% at 50% 28%, transparent 0%, rgba(0,0,0,0.5) 100%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.25) 30%,
        rgba(0,0,0,0.35) 60%,
        rgba(0,0,0,0.96) 100%
      );
  }

  /* ── FLOATING EFFECTS PRESETS PANEL (top-right) ── */
  .pp-effects-panel {
    position: absolute; top: 64px; right: 18px; width: 170px; z-index: 6;
    background: rgba(14,14,18,0.82);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: panelFadeIn 2s ease forwards;
  }
  @keyframes panelFadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .pp-effects-header {

  .pp-effects-header::before { content:'⬡'; color:#9B59B6; font-size:10px; }
  .pp-effect-category {
    padding: 5px 10px 3px;

  .pp-effect-item {

  .pp-effect-item.active::before { content:'●'; color:#2997FF; }

  .pp-monitor-screen {

  .pp-monitor-label {

  .pp-monitor-tc {

    color:#2997FF; letter-spacing:1px;
  }

  /* ── LUMETRI SCOPES PANEL ── */

    box-shadow: 0 8px 32px rgba(0,0,0,0.5);

  }

  }
  .pp-scope-canvas { display:block; width:100%; height: 75px; background: #08080c; }

    position: fixed; bottom: 0; left: 0; right: 0;
    height: 310px; z-index: 90;
    background: linear-gradient(180deg,
      rgba(20,20,24,0) 0%,
      rgba(18,18,22,0.96) 8%,

  .pp-fps-label {
